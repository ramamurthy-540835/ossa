################################################################################
# OSSA Frontend — Cloud Build  (frontend only, backend already deployed)
#
# Usage:
#   gcloud builds submit --config=cloudbuild-frontend.yaml --project=ctoteam .
################################################################################

substitutions:
  _REGION: us-central1
  _REPO: us-central1-docker.pkg.dev/ctoteam/cloud-run-source-deploy
  _FRONTEND_SVC: ossa-frontend
  _BACKEND_URL: https://ossa-backend-gygcwrc62a-uc.a.run.app

steps:

  # ── 1. Build frontend image ───────────────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_BACKEND_URL}
      - -t
      - ${_REPO}/${_FRONTEND_SVC}:$BUILD_ID
      - -t
      - ${_REPO}/${_FRONTEND_SVC}:latest
      - ./frontend
    waitFor: ['-']

  # ── 2. Push ───────────────────────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REPO}/${_FRONTEND_SVC}
    waitFor: [build-frontend]

  # ── 3. Deploy to Cloud Run ────────────────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SVC}
      - --image=${_REPO}/${_FRONTEND_SVC}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --set-env-vars=NEXT_PUBLIC_API_URL=${_BACKEND_URL}
    waitFor: [push-frontend]

  # ── 4. Print URL ──────────────────────────────────────────────────────────────
  - id: print-urls
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        FE=$$(gcloud run services describe ${_FRONTEND_SVC} --region=${_REGION} --format='value(status.url)')
        echo ""
        echo "======================================================="
        echo "  OSSA Frontend — Deployed"
        echo "  Dashboard : $$FE"
        echo "  Backend   : ${_BACKEND_URL}"
        echo "======================================================="
    waitFor: [deploy-frontend]

images:
  - ${_REPO}/${_FRONTEND_SVC}:$BUILD_ID
  - ${_REPO}/${_FRONTEND_SVC}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
