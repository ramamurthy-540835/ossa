################################################################################
# OSSA Agent Dashboard — Cloud Build  (project: ctoteam, region: us-central1)
#
# Deploys:
#   ossa-backend   → Cloud Run (FastAPI,            port 8080)
#   ossa-frontend  → Cloud Run (Next.js standalone, port 3000)
#
# API keys come from Secret Manager; Vertex AI uses ADC via Cloud Run SA.
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml --project=ctoteam .
################################################################################

substitutions:
  _REGION: us-central1
  _REPO: us-central1-docker.pkg.dev/ctoteam/cloud-run-source-deploy
  _BACKEND_SVC: ossa-backend
  _FRONTEND_SVC: ossa-frontend
  _BACKEND_URL: https://ossa-backend-gygcwrc62a-uc.a.run.app

steps:

  # ── 1. Backend — build ───────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REPO}/${_BACKEND_SVC}:$BUILD_ID
      - -t
      - ${_REPO}/${_BACKEND_SVC}:latest
      - ./backend
    waitFor: ['-']

  # ── 2. Backend — push ────────────────────────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REPO}/${_BACKEND_SVC}
    waitFor: [build-backend]

  # ── 3. Backend — deploy Cloud Run ────────────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SVC}
      - --image=${_REPO}/${_BACKEND_SVC}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
      - --set-env-vars=VERTEXAI_PROJECT=ctoteam,VERTEXAI_LOCATION=${_REGION},GOOGLE_CLOUD_PROJECT=ctoteam
    waitFor: [push-backend]

  # ── 4. Frontend — build (backend URL known from substitution) ─────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_BACKEND_URL}
      - -t
      - ${_REPO}/${_FRONTEND_SVC}:$BUILD_ID
      - -t
      - ${_REPO}/${_FRONTEND_SVC}:latest
      - ./frontend
    waitFor: ['-']

  # ── 5. Frontend — push ────────────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REPO}/${_FRONTEND_SVC}
    waitFor: [build-frontend]

  # ── 6. Frontend — deploy Cloud Run ───────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SVC}
      - --image=${_REPO}/${_FRONTEND_SVC}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --set-env-vars=NEXT_PUBLIC_API_URL=${_BACKEND_URL}
    waitFor: [push-frontend, deploy-backend]

  # ── 7. Print final URLs ───────────────────────────────────────────────────────
  - id: print-urls
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        FE=$$(gcloud run services describe ${_FRONTEND_SVC} --region=${_REGION} --format='value(status.url)')
        echo ""
        echo "======================================================="
        echo "  OSSA Agent Dashboard — Deployed"
        echo "======================================================="
        echo "  Dashboard : $$FE"
        echo "  Backend   : ${_BACKEND_URL}"
        echo "  API Docs  : ${_BACKEND_URL}/docs"
        echo "======================================================="
    waitFor: [deploy-frontend]

images:
  - ${_REPO}/${_BACKEND_SVC}:$BUILD_ID
  - ${_REPO}/${_BACKEND_SVC}:latest
  - ${_REPO}/${_FRONTEND_SVC}:$BUILD_ID
  - ${_REPO}/${_FRONTEND_SVC}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
